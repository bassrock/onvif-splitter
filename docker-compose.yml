services:
  onvif-splitter:
    build: .
    container_name: onvif-splitter
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      SECONDARY_IPS: "192.168.2.122/24,192.168.2.123/24,192.168.2.124/24,192.168.2.125/24,192.168.2.126/24,192.168.2.127/24,192.168.2.128/24"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      cameras:
        ipv4_address: 192.168.2.121

networks:
  cameras:
    driver: macvlan
    driver_opts:
      parent: eth0  # Change to match your host's network interface (e.g., ens18, enp0s3)
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1
