services:
  onvif-splitter:
    image: ghcr.io/bassrock/onvif-splitter:main
    container_name: onvif-splitter
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      NVR_HOST: 192.168.2.253
      NVR_PORT: 80
      NVR_RTSP_PORT: 554
      NVR_USERNAME: admin
      NVR_PASSWORD: changeme
      ONVIF_PORT: 8080
      # channel|ip|name|mac — comma separated
      # First channel uses the container's primary interface (192.168.2.123).
      # Remaining channels get macvlan subinterfaces with unique MACs.
      CHANNELS: >-
        3|192.168.2.123|Camera 3|02:42:c0:a8:02:7b,
        4|192.168.2.124|Camera 4|02:42:c0:a8:02:7c,
        5|192.168.2.125|Camera 5|02:42:c0:a8:02:7d,
        6|192.168.2.126|Camera 6|02:42:c0:a8:02:7e,
        7|192.168.2.127|Camera 7|02:42:c0:a8:02:7f,
        8|192.168.2.128|Camera 8|02:42:c0:a8:02:80
    networks:
      cameras:
        ipv4_address: 192.168.2.123

networks:
  cameras:
    external: true
    name: vlan1
